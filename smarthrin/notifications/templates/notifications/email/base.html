<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f4f5f7; }
  .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 8px; overflow: hidden; margin-top: 24px; margin-bottom: 24px; }
  .header { background-color: #4f46e5; padding: 24px 32px; }
  .header h1 { color: #ffffff; margin: 0; font-size: 20px; font-weight: 600; }
  .content { padding: 32px; color: #374151; line-height: 1.6; }
  .content h2 { color: #111827; font-size: 18px; margin-top: 0; }
  .detail-row { padding: 8px 0; border-bottom: 1px solid #f3f4f6; }
  .detail-label { font-weight: 600; color: #6b7280; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; }
  .detail-value { color: #111827; margin-top: 2px; }
  .btn { display: inline-block; background-color: #4f46e5; color: #ffffff; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: 600; margin-top: 16px; }
  .footer { padding: 24px 32px; text-align: center; color: #9ca3af; font-size: 13px; background-color: #f9fafb; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>SmartHR-In</h1>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
  <div class="footer">
    This is an automated notification from SmartHR-In.
    {% if dashboard_url %}<br><a href="{{ dashboard_url }}" style="color: #4f46e5;">Open Dashboard</a>{% endif %}
  </div>
</div>
</body>
</html>
